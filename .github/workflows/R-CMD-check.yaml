name: R-CMD-check

on:
  push:
  pull_request:

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (R ${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - { os: ubuntu-latest, r: 'release', fftw: true }
          - { os: ubuntu-latest, r: 'devel',   fftw: false }
          - { os: macos-latest,  r: 'release', fftw: false }
          - { os: windows-latest, r: 'release', fftw: false }

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      - name: Install system dependencies (Ubuntu + optional FFTW)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config
          if [ "${{ matrix.config.fftw }}" = "true" ]; then
            sudo apt-get install -y libfftw3-dev
          fi

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck, any::testthat, any::knitr, any::rmarkdown
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          args: 'c("--as-cran")'
          error-on: '"warning"'
